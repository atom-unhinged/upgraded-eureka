<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" width="280" height="80">
  <defs>
    <linearGradient id="orbitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
    <linearGradient id="coreGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Atom icon — slightly tilted / unhinged -->
  <g transform="translate(40,40) rotate(15)">
    <ellipse cx="0" cy="0" rx="28" ry="10" fill="none" stroke="url(#orbitGrad)" stroke-width="1.8" opacity="0.9"/>
    <ellipse cx="0" cy="0" rx="28" ry="10" fill="none" stroke="url(#orbitGrad)" stroke-width="1.8" opacity="0.7" transform="rotate(60)"/>
    <ellipse cx="0" cy="0" rx="28" ry="10" fill="none" stroke="url(#orbitGrad)" stroke-width="1.8" opacity="0.5" transform="rotate(120)"/>
    <circle cx="0" cy="0" r="5.5" fill="url(#coreGrad)"/>
    <circle cx="0" cy="-28" r="2.5" fill="#fbbf24"/>
    <circle cx="22" cy="16" r="2" fill="#f59e0b" opacity="0.8"/>
    <circle cx="-24" cy="12" r="1.5" fill="#f97316" opacity="0.7"/>
    <!-- Stray electron — the unhinged one -->
    <circle cx="32" cy="-18" r="1.5" fill="#ef4444" opacity="0.9"/>
  </g>

  <!-- ATOM -->
  <text x="86" y="36"
    font-family="'Barlow Condensed', 'Arial Narrow', sans-serif"
    font-size="30" font-weight="900" letter-spacing="3"
    fill="#f59e0b">ATOM</text>

  <!-- UNHINGED -->
  <text x="88" y="58"
    font-family="'Barlow Condensed', 'Arial Narrow', sans-serif"
    font-size="16" font-weight="300" letter-spacing="8"
    fill="#b8d0e8" opacity="0.8">UNHINGED</text>

  <line x1="86" y1="41" x2="258" y2="41" stroke="#f59e0b" stroke-width="0.6" opacity="0.25"/>
</svg>
